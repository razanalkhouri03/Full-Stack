version: '3.8'

services:
  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: nest-backend
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/mydatabase

  frontend:
    build: ./frontend
    container_name: next-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo-data: